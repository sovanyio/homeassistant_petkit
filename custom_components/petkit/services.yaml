set_feeding_schedule:
  name: Set feeding schedule
  description: >
    Replace the full feeding schedule on a Petkit feeder.
    Each entry in feed_daily_list represents one day of the week (repeats 1-7 = Mon-Sun).
    For dual-hopper feeders (D4S / D4SH), use amount1 and amount2.
    For single-hopper feeders, use amount.
    Time is in seconds since midnight (e.g. 21600 = 06:00, 43200 = 12:00).
  fields:
    device_id:
      name: Device ID
      description: The numeric Petkit device ID of the feeder.
      required: true
      example: 12344481
      selector:
        number:
          min: 1
          mode: box
    feed_daily_list:
      name: Feed daily list
      description: >
        A list of day schedules. Each day has a repeats value (1-7 for Mon-Sun),
        a suspended flag (0=active, 1=suspended), and an items list.
        Each item has: time (seconds since midnight), name (string),
        amount (single hopper), amount1 (hopper 1), amount2 (hopper 2).
      required: true
      example:
        - repeats: 1
          suspended: 0
          items:
            - time: 21600
              name: Breakfast
              amount1: 3
              amount2: 3
            - time: 43200
              name: Lunch
              amount1: 2
              amount2: 2
            - time: 75600
              name: Dinner
              amount1: 5
              amount2: 5
      selector:
        object:

update_litter_box_usage_record:
  name: Update litter box usage record
  description: >
    Update a specific litter box usage record with the correct pet ID.
    This is useful for automation using external presence detection
    (such as Frigate classification) to fix misidentified pets.
  fields:
    device_id:
      name: Device ID
      description: The numeric Petkit device ID of the litter box.
      required: true
      example: 12344481
      selector:
        number:
          min: 1
          mode: box
    old_pet_id:
      name: Old Pet ID
      description: >
        The original Pet ID that the device recorded
        (use "-1" or "0" if it was unknown/unrecognized).
      required: true
      example: "-1"
      selector:
        text:
    new_pet_id:
      name: New Pet ID
      description: The correct Pet ID.
      required: true
      example: "123456789"
      selector:
        text:
    time_out:
      name: Time out
      description: The out timestamp of the record to update (epoch seconds).
      required: true
      example: 1778271882
      selector:
        number:
          mode: box

update_pet_weight:
  name: Update pet weight record
  description: >
    Update the weight stored in a pet's Petkit profile.
    Accepts grams (default) or lbs — lbs are converted to grams before sending to the API.
  fields:
    pet_id:
      name: Pet ID
      description: The numeric Petkit pet ID.
      required: true
      example: 123456789
      selector:
        number:
          min: 1
          mode: box
    weight:
      name: Weight
      description: The weight in the unit specified by the 'unit' field (grams by default).
      required: true
      example: 5420
      selector:
        number:
          min: 0
          mode: box
          step: 1
    unit:
      name: Unit
      description: The unit of the provided weight value. Defaults to g (grams).
      required: false
      default: g
      example: lbs
      selector:
        select:
          options:
            - g
            - lbs
